<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="승리의 여신: 니케(NIKKE) 덱빌딩 도우미 웹앱입니다.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MIMIR - 니케 덱빌딩 도우미">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>MIMIR - 니케 덱빌딩 도우미</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // The value below is injected by flutter build, do not touch.
    const serviceWorkerVersion = null;
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>
  <style>
    body {
      background-color: #121212;
      margin: 0;
      padding: 0;
    }
    
    #loading {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 99999;
      background-color: #121212;
      transition: opacity 0.5s ease-out;
    }

    .loading-container {
      text-align: center;
    }

    .spinner {
      width: 52px;
      height: 52px;
      border: 5px solid rgba(245, 124, 0, 0.15); /* Light orange track */
      border-top-color: #f77c00; /* Deep orange spinner active color */
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      margin: 0 auto 20px auto;
    }

    .loading-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.5;
      }
      50% {
        opacity: 1;
      }
    }
  </style>
</head>
<script>
  async function captureElementById(elementId, fileName) {
    const el = document.getElementById(elementId);
    if (!el) throw new Error("capture target not found: " + elementId);

    const rect = el.getBoundingClientRect();

    // 전체 화면 캡쳐 후, rect 영역만 crop
    const canvas = await html2canvas(document.body, {
      backgroundColor: "#ffffff",
      scale: 2,
      useCORS: true,
      allowTaint: true,
      scrollX: -window.scrollX,
      scrollY: -window.scrollY,
      windowWidth: document.documentElement.clientWidth,
      windowHeight: document.documentElement.clientHeight,
    });

    const out = document.createElement('canvas');
    out.width = Math.round(rect.width * 2);
    out.height = Math.round(rect.height * 2);

    const ctx = out.getContext('2d');
    ctx.drawImage(
      canvas,
      Math.round(rect.left * 2),
      Math.round(rect.top * 2),
      Math.round(rect.width * 2),
      Math.round(rect.height * 2),
      0,
      0,
      Math.round(rect.width * 2),
      Math.round(rect.height * 2)
    );

    // 다운로드 트리거
    const a = document.createElement('a');
    a.href = out.toDataURL('image/png');
    a.download = fileName || 'deck.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
</script>

<body>
  <div id="loading">
    <div class="loading-container">
      <div class="spinner"></div>
      <div class="loading-text">Loading Mimir</div>
    </div>
  </div>

  <script>
    window.addEventListener('load', function (ev) {
      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function (engineInitializer) {
          engineInitializer.initializeEngine().then(function (appRunner) {
            appRunner.runApp();
            
            // Fading out and removing the loading screen beautifully
            var loading = document.getElementById('loading');
            if (loading) {
              loading.style.opacity = '0';
              setTimeout(function () {
                loading.remove();
              }, 500);
            }
          });
        }
      });
    });
  </script>
</body>

</html>
